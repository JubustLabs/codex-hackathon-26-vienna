name: Deploy demo export to Pages

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/docs.yaml"
      - "data/**"
      - "docs/**"
      - "justfile"
      - "package.json"
      - "bun.lock"
      - "scripts/**"
      - "server/**"
      - "shared/**"
      - "slides/**"
      - "src/**"
      - "video/**"
      - "vite.config.ts"
      - "tsconfig.json"
      - "index.html"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - ".github/workflows/docs.yaml"
      - "data/**"
      - "docs/**"
      - "justfile"
      - "package.json"
      - "bun.lock"
      - "scripts/**"
      - "server/**"
      - "shared/**"
      - "slides/**"
      - "src/**"
      - "video/**"
      - "vite.config.ts"
      - "tsconfig.json"
      - "index.html"
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build demo export
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install just
        run: |
          sudo apt-get update
          sudo apt-get install -y just

      - name: Install dependencies
        run: just setup

      - name: Install Playwright Chromium
        run: bun x playwright install --with-deps chromium

      - name: Build demo export
        env:
          EXPORT_DEMO_REFRESH_CAPTURE: "1"
        run: just export-demo

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
