default_stages: [pre-commit]
default_install_hook_types: [pre-commit, pre-push]
minimum_pre_commit_version: "3.0.0"

repos:
  - repo: local
    hooks:
      - id: georg-prettier
        name: georg format
        entry: georg/scripts/run-prettier.sh
        language: system
        files: ^georg/.*\.(ts|tsx|js|jsx|json|md|css|html|yml|yaml)$
        pass_filenames: true
        require_serial: false

      - id: georg-eslint
        name: georg lint
        entry: georg/scripts/run-eslint.sh
        language: system
        files: ^georg/.*\.(ts|tsx)$
        pass_filenames: true
        require_serial: false

      - id: georg-typecheck
        name: georg typecheck
        entry: sh -c 'cd georg && bun run typecheck'
        language: system
        files: ^georg/.*\.(ts|tsx)$
        pass_filenames: false
        require_serial: false

      - id: georg-check-merge-conflict
        name: georg merge conflict markers
        entry: sh -c 'if rg -e "^(<<<<<<< |=======|>>>>>>> )" georg -g "*.ts" -g "*.tsx" -g "*.json" -g "*.md" -g "*.css" -g "*.yml" -g "*.yaml"; then echo "Found merge conflict markers in georg"; exit 1; fi'
        language: system
        pass_filenames: false

      - id: georg-max-lines
        name: georg max lines
        entry: georg/scripts/check-max-lines.sh
        language: system
        files: ^georg/.*\.(ts|tsx|js|jsx|json|md|css|html|yml|yaml)$
        pass_filenames: true
